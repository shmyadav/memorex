<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoRex Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="overlay"></div>

<div class="container glass-panel">
    <header>
        <h1>Memo<span class="highlight">Rex</span></h1>
        <p class="subtitle">Neural Graph Memory Interface</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-target="add-tab">Add Memory</button>
        <button class="tab-btn" data-target="search-tab">Search Graph</button>
    </div>

    <div class="tab-content active" id="add-tab">
        <div class="input-group">
            <label for="memoryInput">New Experience</label>
            <textarea id="memoryInput" rows="5" placeholder="E.g., The user enjoys playing tennis on Sunday mornings..."></textarea>
        </div>
        <button id="addMemoryBtn" class="action-btn">
            <span class="btn-text">Inject Memory</span>
            <span class="loader hidden"></span>
        </button>
        <div id="addMessage" class="message hidden"></div>
    </div>

    <div class="tab-content" id="search-tab">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Query the memory graph...">
            <button id="searchBtn" class="action-btn icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
        
        <div id="searchResults" class="results-container empty">
            <p class="placeholder-text">Awaiting input query...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
